name: build

on:
  push:
    branches:
      - "main"

jobs:
  build:
    uses: ethereum-optimism/factory/.github/workflows/docker.yaml@cc1794a8e99695971560f5354076fbe2ddca9f2e
    with:
      image_name: ecosystem-verbs-backend
      context: .
      dockerfile: Dockerfile
      gcp_project_id: ${{ vars.GCP_PROJECT_ID_OPLABS_TOOLS_ARTIFACTS }}
      registry: us-docker.pkg.dev/oplabs-tools-artifacts/images
      tag: latest
      target: actions-service
      build_args: |
        DOCKER_TARGET=actions-service
    permissions:
      contents: read
      id-token: write
      attestations: write
